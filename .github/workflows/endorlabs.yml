name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      id-token: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Endor Labs Scan
      uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
      with:
        namespace: "endor-solutions-ypulse.github-ci"
        scan_dependencies: true
        scan_secrets: false
        enable_pr_comments: true
        github_token: ${{ secrets.GITHUB_TOKEN }}
        use_bazel: true
        bazel_targets_query: "kind(go_binary, //projects/...) + kind(go_library, //projects/...) + kind(go_test, //projects/...) + kind(java_binary, //projects/...) + kind(java_library, //projects/...) + kind(js_binary, //projects/...) + kind(js_library, //projects/...) + kind(py_binary, //projects/...) + kind(py_library, //projects/...) + kind(py_test, //projects/...) + kind(ts_project, //projects/...)"
        additional_args: "--use-bazel-aspects"
        sarif_file: findings.sarif
    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: findings.sarif
