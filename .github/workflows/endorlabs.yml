name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      id-token: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Endor Labs Scan
      uses: endorlabs/github-action@v1
      with:
        namespace: "endor-solutions-ypulse.github-ci"
        scan_dependencies: true
        scan_secrets: false
        enable_pr_comments: true
        github_token: ${{ secrets.GITHUB_TOKEN }}
        additional_args: "--use-bazel --use-bazel-aspects --bazel-include-targets=//projects/go_hello_world/...,//projects/go_web/...,//projects/java_greeter/...,//projects/node_calculator/...,//projects/node_web/...,//projects/python_calculator/...,//projects/python_web/...,//projects/ts_app/..."
        sarif_file: findings.sarif
    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: findings.sarif
