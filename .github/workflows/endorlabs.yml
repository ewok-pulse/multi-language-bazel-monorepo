name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
      contents: read
      id-token: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Bazelisk
      uses: bazelbuild/setup-bazelisk@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.18"
    - name: Pre-build Bazel scan targets
      run: |
        bazel query 'kind("go_binary", //projects/...) + kind("go_library", //projects/...) + kind("java_binary", //projects/...) + kind("java_library", //projects/...) + kind("js_binary", //projects/...) + kind("js_library", //projects/...) + kind("py_binary", //projects/...) + kind("py_library", //projects/...)' > .endorlabs.bazel.targets
        if [ ! -s .endorlabs.bazel.targets ]; then
          echo "No Bazel targets resolved for the Endor Labs scan" >&2
          exit 1
        fi
        xargs bazel build < .endorlabs.bazel.targets
    - name: Debug Go toolchain visibility
      run: |
        which go || true
        go version || true
        env | grep -E '^(GOROOT|GOPATH)=' || true
    - name: Install endorctl
      run: |
        curl -fsSL https://api.endorlabs.com/download/latest/endorctl_linux_amd64 -o endorctl
        chmod +x endorctl
        sudo mv endorctl /usr/local/bin/endorctl
    - name: Endorctl Direct PR Scan
      if: github.event_name == 'pull_request'
      env:
        ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
      run: |
        endorctl scan \
          --namespace="endor-solutions-ypulse.github-ci" \
          --enable-github-action-token=true \
          --use-bazel \
          --bazel-targets-query='kind("go_binary", //projects/...) + kind("go_library", //projects/...) + kind("java_binary", //projects/...) + kind("java_library", //projects/...) + kind("js_binary", //projects/...) + kind("js_library", //projects/...) + kind("py_binary", //projects/...) + kind("py_library", //projects/...)' \
          --quick-scan \
          --sarif-file=findings.sarif
    - name: Endorctl Direct Monitor Scan
      if: github.event_name == 'push'
      run: |
        endorctl scan \
          --namespace="endor-solutions-ypulse.github-ci" \
          --enable-github-action-token=true \
          --use-bazel \
          --bazel-targets-query='kind("go_binary", //projects/...) + kind("go_library", //projects/...) + kind("java_binary", //projects/...) + kind("java_library", //projects/...) + kind("js_binary", //projects/...) + kind("js_library", //projects/...) + kind("py_binary", //projects/...) + kind("py_library", //projects/...)' \
          --use-bazel-aspects \
          --sarif-file=findings.sarif
    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: findings.sarif
